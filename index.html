<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashoda Ultimate Law Book Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 2; pointer-events: none; }
        .status-layer {
            position: absolute; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.85); padding: 25px 0;
            text-align: center; z-index: 10; pointer-events: none;
        }
        #status { font-size: 24px; color: #f1c40f; font-weight: bold; padding: 0 15px; }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvasOverlay"></canvas>
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <div class="status-layer">
        <div id="status">AI Engine Loading...</div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvasOverlay = document.getElementById('canvasOverlay');
    const captureCanvas = document.getElementById('captureCanvas');
    const statusDiv = document.getElementById('status');
    let synth = window.speechSynthesis;
    let isProcessing = false;
    let lastSpokenText = "";
    let scanTimer = null;
    let scheduler = null;

    async function initOCR() {
        statusDiv.innerText = "Initializing AI Engine...";
        scheduler = Tesseract.createScheduler();
        
        const worker = await Tesseract.createWorker('eng+tel', 1, {
            errorHandler: e => console.error(e)
        });
        
        await worker.setParameters({
            tessedit_pageseg_mode: Tesseract.PSM.AUTO, 
            preserve_interword_spaces: '1'
        });

        scheduler.addWorker(worker);
        
        statusDiv.innerText = "App Ready! Point to Book Page...";
        speakNotification("App is ready. Please point your camera to the book page.");
        
        scanTimer = setInterval(autoCaptureAndProcess, 4000);
    }

    async function initCamera() {
        const constraints = {
            video: { 
                facingMode: "environment",
                width: { ideal: 1280 }, 
                height: { ideal: 720 } 
            },
            audio: false
        };

        try {
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            await initOCR();
        } catch (err) {
            console.log("Trying alternative camera constraint...");
            try {
                const basicStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = basicStream;
                await initOCR();
            } catch (basicErr) {
                statusDiv.innerText = "Please allow camera access.";
                speakNotification("Camera error. Please grant permission.");
            }
        }
    }

    async function autoCaptureAndProcess() {
        if (isProcessing || synth.speaking || !scheduler) return;

        isProcessing = true;
        statusDiv.innerText = "Scanning text...";

        const ctxCapture = captureCanvas.getContext('2d');
        captureCanvas.width = video.videoWidth;
        captureCanvas.height = video.videoHeight;
        
        ctxCapture.filter = 'contrast(1.2) brightness(1.0)';
        ctxCapture.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);

        try {
            const result = await scheduler.addJob('recognize', captureCanvas);
            
            const ctxOverlay = canvasOverlay.getContext('2d');
            canvasOverlay.width = video.videoWidth;
            canvasOverlay.height = video.videoHeight;
            ctxOverlay.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);

            if (result && result.data) {
                let text = result.data.text.trim();
                let lines = result.data.lines;

                if (text.length > 2 && text !== lastSpokenText) {
                    lastSpokenText = text;
                    statusDiv.innerText = "Reading aloud...";

                    if (lines && lines.length > 0) {
                        ctxOverlay.strokeStyle = "#f1c40f"; 
                        ctxOverlay.lineWidth = 6; 
                        
                        lines.forEach(line => {
                            if(line.text.trim().length > 2) {
                                const bbox = line.bbox;
                                ctxOverlay.strokeRect(bbox.x0, bbox.y0, (bbox.x1 - bbox.x0), (bbox.y1 - bbox.y0));
                            }
                        });
                    }

                    readAloud(text);
                } else if (text.length <= 2) {
                    statusDiv.innerText = "Point to Book Page...";
                }
            }
        } catch (error) {
            console.error("OCR Error:", error);
        } finally {
            isProcessing = false;
        }
    }

    function readAloud(text) {
        synth.cancel();
        let cleanText = text.replace(/\n/g, " ");
        const utterance = new SpeechSynthesisUtterance(cleanText);
        const hasTelugu = /[\u0C00-\u0C7F]/.test(cleanText);
        
        utterance.lang = hasTelugu ? "te-IN" : "en-US";
        utterance.rate = hasTelugu ? 0.82 : 0.90; 
        
        utterance.onend = function() {
            const ctxOverlay = canvasOverlay.getContext('2d');
            ctxOverlay.clearRect(0, 0, canvasOverlay.width, canvasOverlay.height);
            statusDiv.innerText = "Point to Book Page...";
        };

        synth.speak(utterance);
    }

    function speakNotification(msg) {
        if (synth.speaking) synth.cancel();
        const u = new SpeechSynthesisUtterance(msg);
        u.lang = "en-US"; u.rate = 0.9;
        synth.speak(u);
    }

    window.onload = initCamera;
</script>
</body>
</html>
