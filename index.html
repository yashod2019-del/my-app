<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashoda Voice Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #000;
            font-family: sans-serif;
        }
        #video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 1;
        }
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: center; z-index: 10;
        }
        .top-box {
            width: 100%; background: rgba(0, 0, 0, 0.7);
            padding: 20px 0; text-align: center;
        }
        .bottom-box {
            width: 100%; background: rgba(0, 0, 0, 0.7);
            padding: 25px 0; text-align: center;
        }
        select {
            padding: 15px 30px; font-size: 20px; border-radius: 10px;
            font-weight: bold; background-color: #16a085; color: white; border: 2px solid #fff;
        }
        #status { font-size: 22px; color: #f1c40f; font-weight: bold; }
        #textResult { position: absolute; bottom: -999px; opacity: 0; }
    </style>
</head>
<body onclick="startScan()">

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <textarea id="textResult" readonly></textarea>

    <div class="ui-layer">
        <div class="top-box">
            <select id="langSelect" onclick="event.stopPropagation()" onchange="resetApp(event)">
                <option value="eng" selected>English</option>
                <option value="tel">Telugu</option>
            </select>
        </div>
        <div class="bottom-box">
            <div id="status">లోడ్ అవుతోంది...</div>
        </div>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');
    const textResult = document.getElementById('textResult');
    let synth = window.speechSynthesis;
    let isReading = false;

    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                audio: false
            });
            video.srcObject = stream;
            statusDiv.innerText = "యాప్ రెడీ అయింది. స్క్రీన్ పై క్లిక్ చేయండి.";
            speakNow("యాప్ రెడీ అయింది. స్క్రీన్ పై ఎక్కడైనా ఒక్కసారి ట్యాప్ చేయండి");
        } catch (err) {
            statusDiv.innerText = "కెమెరా ఓపెన్ అవ్వలేదు.";
        }
    }

    async function startScan() {
        if (synth.speaking) {
            synth.cancel();
            statusDiv.innerText = "ఆపాను. మళ్లీ స్కాన్ చేయడానికి ట్యాప్ చేయండి.";
            return;
        }
        if (isReading) return;

        isReading = true;
        statusDiv.innerText = "ఫోన్ కదపకండి.. స్కాన్ చేస్తున్నాను...";
        speakNow("ఫోన్ కదపకండి");

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const lang = document.getElementById('langSelect').value;

        try {
            const res = await Tesseract.recognize(canvas, lang);
            let txt = res.data.text.trim();

            if (txt !== "") {
                textResult.value = txt;
                statusDiv.innerText = "చదువుతున్నాను...";
                readAloud(txt);
            } else {
                statusDiv.innerText = "అక్షరాలు దొరకలేదు. మళ్లీ ట్యాప్ చేయండి.";
                speakNow("అక్షరాలు దొరకలేదు. మళ్లీ ట్యాప్ చేయండి");
            }
        } catch (e) {
            statusDiv.innerText = "లోపం జరిగింది.";
        } finally {
            isReading = false;
        }
    }

    function readAloud(t) {
        synth.cancel();
        const u = new SpeechSynthesisUtterance(t);
        const lang = document.getElementById('langSelect').value;
        u.lang = (lang === "tel") ? "te-IN" : "en-US";
        u.rate = (lang === "tel") ? 0.85 : 0.95;
        synth.speak(u);
    }

    function speakNow(m) {
        if (synth.speaking) return;
        const u = new SpeechSynthesisUtterance(m);
        u.lang = "te-IN"; u.rate = 0.9;
        synth.speak(u);
    }

    function resetApp(e) {
        e.stopPropagation();
        synth.cancel();
        statusDiv.innerText = "భాష మార్చబడింది.";
        speakNow("భాష మార్చబడింది");
    }

    window.onload = initCamera;
</script>
</body>
</html>
