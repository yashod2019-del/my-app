<!DOCTYPE html>
<html lang="te">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yashoda Universal Auto-Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { margin: 0; background: #000; height: 100vh; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #status { position: absolute; bottom: 20px; width: 100%; text-align: center; color: #fff; font-size: 24px; background: rgba(0,0,0,0.5); padding: 20px; }
    </style>
</head>
<body>
    <video id="video" autoplay playsinline></video>
    <div id="status">రెడీ అవుతోంది...</div>
    <canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    let synth = window.speechSynthesis;
    let isProcessing = false;
    let lastSpokenText = "";

    async function init() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            status.innerText = "కెమెరా రెడీ! టెక్స్ట్ వైపు చూపించండి.";
            speak("యాప్ రెడీ అయింది. ఎక్కడైనా టెక్స్ట్ వైపు చూపించండి, అది దానంతట అదే చదువుతుంది.");
            setInterval(scan, 2500); // ప్రతి 2.5 సెకన్లకు స్కాన్ చేస్తుంది
        } catch (e) { status.innerText = "కెమెరా పర్మిషన్ ఇవ్వండి."; }
    }

    async function scan() {
        if (isProcessing || synth.speaking) return;
        isProcessing = true;

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // OSD మోడ్ లో టెక్స్ట్ ఎక్కడ ఉన్నా గుర్తిస్తుంది
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng+tel', {
            logger: m => console.log(m)
        });

        if (text.trim().length > 5 && text.trim() !== lastSpokenText) {
            lastSpokenText = text.trim();
            status.innerText = "చదువుతున్నాను...";
            speak(text);
        } else {
            status.innerText = "టెక్స్ట్ వైపు చూపించండి...";
        }
        isProcessing = false;
    }

    function speak(txt) {
        synth.cancel();
        let msg = new SpeechSynthesisUtterance(txt);
        // ఆటో డిటెక్ట్ లాంగ్వేజ్
        msg.lang = /[\u0C00-\u0C7F]/.test(txt) ? 'te-IN' : 'en-US';
        synth.speak(msg);
    }

    init();
</script>
</body>
</html>
